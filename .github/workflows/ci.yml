name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install Backend Dependencies
      run: npm install
      working-directory: backend
    - name: Run Backend Tests
      run: npm test
      working-directory: backend

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install Frontend Dependencies
      run: npm install
      working-directory: frontend
    - name: Build Frontend
      run: npm run build
      working-directory: frontend
